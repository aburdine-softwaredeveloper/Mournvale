<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mournvale</title>

  <!-- Pixel font from Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./menu-intro-fog.css" />
  <link rel="stylesheet" href="./boot.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════
       BOOT SPLASH SCREEN
       Game Boy Color style power-on: stormy sky,
       title drop, year stamp. Skippable. Shown first.
  ════════════════════════════════════════ -->
  <div id="screen-boot" class="screen screen-active">
    <div id="boot-content">
      <div id="boot-title">MOURNVALE</div>
      <div id="boot-stamp">© 2026 &nbsp;·&nbsp; aburdine.softwaredeveloper</div>
      <div id="boot-prompt" class="blink">▸ PRESS START</div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       MAIN MENU SCREEN
       New Game / Load Game + 5-slot picker
  ════════════════════════════════════════ -->
  <div id="screen-menu" class="screen hidden">
    <div id="menu-content">

      <div id="menu-title">MOURNVALE</div>
      <div id="menu-subtitle">▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔▔</div>

      <!-- Root choice: New Game / Load Game -->
      <div id="menu-root-buttons" class="menu-buttons">
        <button id="menu-new-game" class="snes-btn menu-big-btn">NEW GAME</button>
        <button id="menu-load-game" class="snes-btn menu-big-btn">LOAD GAME</button>
      </div>

      <!-- Slot picker (hidden until a mode is chosen) -->
      <div id="menu-slot-panel" class="snes-panel hidden">
        <div id="menu-slot-title" class="panel-title">CHOOSE A SLOT</div>
        <div id="menu-slot-list" class="slot-list-container"></div>
        <button id="menu-back-btn" class="snes-btn menu-back">◄ BACK</button>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════
       INTRO SCREEN
       Full-screen cinematic before character creation
  ════════════════════════════════════════ -->
  <div id="screen-intro" class="screen hidden">
    <div id="intro-content">
      <div id="intro-header" class="hidden"></div>
      <div id="intro-text"></div>
      <div id="intro-cursor" class="blink hidden">▼ Press any key to continue</div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       CHARACTER CREATION SCREEN
       Tavern keeper dialogue + selection menus
  ════════════════════════════════════════ -->
  <div id="screen-creation" class="screen hidden">

    <!-- Background atmosphere -->
    <div id="creation-bg">
      <div id="creation-scene-label">The Broken Lantern</div>
      <!-- Portrait preview — populated during the class step -->
      <div id="creation-portrait" class="portrait-frame hidden">
        <div id="creation-portrait-img" class="portrait-img"></div>
        <div id="creation-portrait-label" class="portrait-label"></div>
      </div>
    </div>

    <!-- Dialogue box — tavern keeper speaks here -->
    <div id="creation-dialogue-box" class="snes-panel">
      <div id="creation-speaker" class="dialogue-speaker"></div>
      <div id="creation-text" class="dialogue-text"></div>
    </div>

    <!-- Choice menu — rendered when choices are available -->
    <div id="creation-choices" class="snes-panel hidden">
      <ul id="creation-choice-list" class="choice-list"></ul>
    </div>

    <!-- Free text input — rendered for name step only -->
    <div id="creation-input-box" class="snes-panel hidden">
      <label class="pixel-label">► </label>
      <input
        id="creation-name-input"
        class="pixel-input"
        type="text"
        maxlength="20"
        placeholder="Enter your name..."
        autocomplete="off"
      />
      <button id="creation-name-confirm" class="snes-btn">OK</button>
    </div>

  </div>

  <!-- ═══════════════════════════════════════
       GAME SCREEN
       Main game UI — active players only
  ════════════════════════════════════════ -->
  <div id="screen-game" class="screen hidden">

    <!-- Top bar: portrait + identity -->
    <header id="game-header" class="snes-panel">
      <div id="header-portrait" class="header-portrait"></div>
      <div id="header-identity">
        <span id="player-name-display">Mournvale</span>
        <span id="player-class-display"></span>
      </div>
    </header>

    <!-- Main content: three columns — Details | Room Image | Log -->
    <div id="game-body">

      <!-- Left column: location info, NPCs, party -->
      <div id="details-panel" class="snes-panel">

        <div class="panel-title">◆ LOCATION</div>
        <div id="room-name" class="room-name-text">—</div>
        <div id="room-description" class="room-desc-text"></div>

        <div class="panel-divider"></div>

        <div class="panel-title">◆ EXITS</div>
        <div id="room-exits" class="room-exits-text">—</div>

        <div class="panel-divider"></div>

        <!-- HERE: NPCs at this location only. -->
        <!-- "No one is here." shown by GameScreen when list is empty. -->
        <!-- room-players has been removed — party is shown below. -->
        <div class="panel-title">◆ HERE</div>
        <div id="room-npcs" class="room-npcs-text"></div>

        <div class="panel-divider"></div>

        <!-- PARTY: always visible, blank when solo. -->
        <!-- Populated by PartyPanel.update() via GameScreen.updateParty(). -->
        <div class="panel-title">◆ PARTY</div>
        <div id="party-panel-container"></div>

        <!-- Character/skills mode — shown in place of the above when the
             skills screen is open. Rendered by CharacterPanel. -->
        <div id="character-panel" class="skill-mode"></div>

      </div>

      <!-- Open-book spread: the room illustration (left page) and the log
           (right page) are two halves of ONE parchment sheet, joined by a
           central crease. The torn edges live on this outer sheet; the two
           inner panels are just regions on the page. -->
      <div id="book-spread" class="snes-panel">

        <!-- Left page: the room illustration (no label — the picture is
             understood to be the view of the room). -->
        <div id="room-image-panel" class="snes-panel">
          <div id="room-image" class="room-image"></div>

          <!-- Talent tree mode — portrait preview + class talent tree. -->
          <div id="talent-panel" class="skill-mode"></div>
        </div>

        <!-- The crease down the middle of the open book. -->
        <div id="book-binding" aria-hidden="true"></div>

        <!-- Right page: message log -->
        <div id="log-panel" class="snes-panel">
          <div class="panel-title">◆ LOG</div>
          <div id="message-log"></div>

          <!-- Ability loadout mode — slots + known abilities. -->
          <div id="ability-panel" class="skill-mode"></div>
        </div>

      </div>

    </div>

    <!-- Bottom bar: command menu + input -->
    <div id="game-footer">

      <!-- Command buttons — clickable shortcuts -->
      <div id="command-menu" class="snes-panel">
        <div class="panel-title">◆ COMMANDS</div>
        <div id="command-buttons"></div>
      </div>

      <!-- Text input for custom commands -->
      <div id="input-panel" class="snes-panel">
        <span class="input-prompt">►</span>
        <input
          id="command-input"
          class="pixel-input"
          type="text"
          placeholder="Type a command..."
          autocomplete="off"
        />
        <button id="command-send" class="snes-btn">SEND</button>
      </div>

    </div>

    <!-- Quest board overlay — hidden until opened -->
    <div id="quest-overlay" class="overlay hidden">
      <div id="quest-board" class="snes-panel overlay-panel">
        <div class="overlay-header">
          <span class="panel-title">◆ QUEST BOARD</span>
          <button id="quest-close-btn" class="snes-btn">✕</button>
        </div>
        <div id="quest-active" class="quest-active hidden"></div>
        <div id="quest-list" class="quest-list"></div>
      </div>
    </div>

    <!-- Party invite prompt — hidden until an invite arrives -->
    <div id="invite-overlay" class="overlay hidden">
      <div id="invite-prompt" class="snes-panel overlay-panel invite-panel">
        <div class="panel-title">◆ PARTY INVITE</div>
        <div id="invite-text" class="invite-text"></div>
        <div class="invite-actions">
          <button id="invite-accept-btn" class="snes-btn">ACCEPT</button>
          <button id="invite-decline-btn" class="snes-btn">DECLINE</button>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="./app.ts"></script>
</body>
</html>
