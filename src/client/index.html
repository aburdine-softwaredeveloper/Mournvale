<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mournvale</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div id="game">

        <header id="header">
            <h1>Mournvale</h1>
        </header>

        <div id="room-panel">
            <h2 id="room-name">Connecting...</h2>
            <p id="room-description">
                Establishing connection to server...
            </p>
        </div>

        <div id="log-panel">
            <div id="message-log"></div>
        </div>

        <div id="input-panel">
            <input
                id="command-input"
                type="text"
                placeholder="Enter command..."
                autocomplete="off"
            />
        </div>

    </div>

    <script type="module" src="./app.ts"></script>

</body>
</html>
